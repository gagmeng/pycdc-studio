name: Build and Release Windows Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create or update a GitHub release with the built zip"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Tag to publish when running manually (for example: v0.1.0)"
        required: false
        default: ""
        type: string
      pycdc_ref:
        description: "Optional pycdc branch, tag, or commit to build"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      QT_VERSION: 6.8.3
      QT_ARCH: win64_msvc2022_64
      PYCDC_REPO: https://github.com/zrax/pycdc.git

    steps:
      - name: Check out pycdc-studio
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Qt build tooling
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall
          python -m aqt install-qt windows desktop $env:QT_VERSION $env:QT_ARCH --outputdir "$env:RUNNER_TEMP\Qt" -m qttools
          "QT_ROOT_DIR=$env:RUNNER_TEMP\Qt\$env:QT_VERSION\$env:QT_ARCH" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Clone official pycdc
        id: pycdc_checkout
        shell: pwsh
        run: |
          git clone --depth 1 $env:PYCDC_REPO external\pycdc
          $requestedRef = '${{ github.event.inputs.pycdc_ref }}'.Trim()
          if (-not [string]::IsNullOrWhiteSpace($requestedRef)) {
            git -C external\pycdc fetch --depth 1 origin $requestedRef
            git -C external\pycdc checkout FETCH_HEAD
          }
          $pycdcCommit = (git -C external\pycdc rev-parse HEAD).Trim()
          "pycdc_commit=$pycdcCommit" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Configure pycdc-studio
        shell: pwsh
        run: |
          cmake -S . -B build\studio -G "Visual Studio 17 2022" -A x64 -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Build pycdc-studio
        shell: pwsh
        run: |
          cmake --build build\studio --config Release
          cmake --install build\studio --config Release --prefix build\package

      - name: Configure pycdc
        shell: pwsh
        run: |
          cmake -S external\pycdc -B build\pycdc -G "Visual Studio 17 2022" -A x64

      - name: Build pycdc and pycdas
        shell: pwsh
        run: |
          cmake --build build\pycdc --config Release --target pycdc pycdas

      - name: Assemble release package
        id: package
        shell: pwsh
        run: |
          $releaseTag = if ($env:GITHUB_REF -like 'refs/tags/*') { $env:GITHUB_REF_NAME } elseif (-not [string]::IsNullOrWhiteSpace('${{ github.event.inputs.release_tag }}')) { '${{ github.event.inputs.release_tag }}'.Trim() } else { 'dev-' + $env:GITHUB_RUN_NUMBER }
          $packageName = "pycdc-studio-$releaseTag-windows-x64"
          $packageRoot = Join-Path $env:RUNNER_TEMP $packageName
          $binDir = Join-Path $packageRoot "bin"
          $pycdcCommit = '${{ steps.pycdc_checkout.outputs.pycdc_commit }}'

          if (Test-Path $packageRoot) {
            Remove-Item -Recurse -Force $packageRoot
          }

          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          Copy-Item -Recurse -Force build\package\* $packageRoot
          Copy-Item -Force build\pycdc\Release\pycdc.exe $binDir
          Copy-Item -Force build\pycdc\Release\pycdas.exe $binDir
          Copy-Item -Force external\pycdc\LICENSE (Join-Path $packageRoot "LICENSE.pycdc.txt")
          Copy-Item -Force README.md (Join-Path $packageRoot "README.md")
          if (Test-Path README_CN.md) {
            Copy-Item -Force README_CN.md (Join-Path $packageRoot "README_CN.md")
          }

          @(
            "pycdc bundled source information",
            "Repository: $env:PYCDC_REPO",
            "Commit: $pycdcCommit",
            "Bundled binaries: pycdc.exe, pycdas.exe",
            "Source retrieval: clone the upstream repository at the commit above"
          ) | Set-Content -Path (Join-Path $packageRoot "THIRD_PARTY_NOTICES.txt") -Encoding utf8

          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" --release "$binDir\pycdc-studio.exe"

          $zipPath = Join-Path $env:RUNNER_TEMP ($packageName + ".zip")
          if (Test-Path $zipPath) {
            Remove-Item -Force $zipPath
          }

          Compress-Archive -Path $packageRoot -DestinationPath $zipPath

          "release_tag=$releaseTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "package_name=$packageName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload packaged zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.package_name }}
          path: ${{ steps.package.outputs.zip_path }}
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh --version
          $tag = '${{ steps.package.outputs.release_tag }}'
          $zipPath = '${{ steps.package.outputs.zip_path }}'

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zipPath --clobber
          } else {
            gh release create $tag $zipPath --target $env:GITHUB_SHA --generate-notes --title $tag
          }
